<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>amine ov | خدمات برمجية</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0a0f1c;
    color:white;
    font-family:'Segoe UI';
}

/* NAVBAR */
.navbar{
    background:#0a0f1c;
    border-bottom:1px solid #1f2a48;
}
.logo{
    font-size:22px;
    font-weight:bold;
    color:#7c4dff;
}

/* HERO */
.hero{
    padding:100px 20px;
}
.hero h1{
    font-size:45px;
    font-weight:bold;
}
.gradient{
    background: linear-gradient(90deg,#7c4dff,#00c6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.btn-main{
    background:linear-gradient(90deg,#7c4dff,#00c6ff);
    border:none;
    padding:10px 25px;
    border-radius:10px;
    color:white;
}

/* SERVICES */
.services{
    padding:60px 20px;
}
.card{
    background:#111827;
    border:none;
    border-radius:15px;
    color:white;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-10px);
}

/* PORTFOLIO */
.portfolio{
    padding:60px 20px;
}
.project{
    background:#111827;
    padding:20px;
    border-radius:15px;
}

/* CONTACT */
.contact{
    padding:60px 20px;
}
input, textarea{
    background:#111827 !important;
    border:none !important;
    color:white !important;
}

/* FOOTER */
footer{
    padding:20px;
    text-align:center;
    border-top:1px solid #1f2a48;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<div class="logo">amine ov</div>

<div>
<a href="#services" class="text-white me-3">خدماتي</a>
<a href="#portfolio" class="text-white me-3">أعمالي</a>
<a href="#contact" class="text-white">تواصل</a>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero container">
<div class="row align-items-center">

<div class="col-md-6">
<h1>نحول أفكارك إلى <span class="gradient">منتجات رقمية</span></h1>
<p>تصميم مواقع، تطبيقات، ومتاجر احترافية</p>

<button class="btn-main">ابدأ مشروعك</button>
</div>

<div class="col-md-6 text-center">
<img src="https://cdn-icons-png.flaticon.com/512/2721/2721294.png" width="300">
</div>

</div>
</section>

<!-- SERVICES -->
<section class="services container" id="services">
<h2 class="text-center mb-4">خدماتي</h2>

<div class="row">
<div class="col-md-3">
<div class="card p-3 text-center">💻 مواقع ويب</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">📱 تطبيقات</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">🛒 متاجر</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">🎨 UI/UX</div>
</div>
</div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio container" id="portfolio">
<h2 class="text-center mb-4">أعمالي</h2>

<div class="row">
<div class="col-md-4">
<div class="project">متجر إلكتروني</div>
</div>

<div class="col-md-4">
<div class="project">تطبيق توصيل</div>
</div>

<div class="col-md-4">
<div class="project">موقع شركة</div>
</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact container" id="contact">
<h2 class="text-center mb-4">تواصل معي</h2>

<form onsubmit="sendMsg(event)">
<input id="name" class="form-control mb-2" placeholder="اسمك">
<input id="phone" class="form-control mb-2" placeholder="رقمك">
<textarea id="msg" class="form-control mb-2" placeholder="رسالتك"></textarea>

<button class="btn-main">إرسال</button>
</form>

<div class="mt-4 text-center">
<p>📞 واتساب: 0663190202</p>
<p>📘 فيسبوك: <a href="https://www.facebook.com/share/1LWoyVPK99/" target="_blank" class="text-info">اضغط هنا</a></p>
</div>
</section>

<!-- FOOTER -->
<footer>
amine ov © 2026
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/213663190202" class="whatsapp">💬</a>

<script>
function sendMsg(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg").value;

    let url = "https://wa.me/213663190202?text="
    + "الاسم: " + name + "%0A"
    + "الهاتف: " + phone + "%0A"
    + "الطلب: " + msg;

    window.open(url,"_blank");
}
</script>

</body>
</html>
