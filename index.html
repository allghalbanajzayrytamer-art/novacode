<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>amine ov | خدمات برمجية</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0a0f1c;
    color:white;
    font-family:'Segoe UI';
}

/* NAVBAR */
.navbar{
    background:#0a0f1c;
    border-bottom:1px solid #1f2a48;
}
.logo{
    color:#7c4dff;
    font-weight:bold;
}

/* BUTTON */
.btn-main{
    background:linear-gradient(90deg,#7c4dff,#00c6ff);
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:10px;
}

/* FORM */
input, textarea{
    background:#111827 !important;
    border:none !important;
    color:white !important;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container">
<div class="logo">amine ov</div>
</div>
</nav>

<!-- HERO -->
<section class="container text-center mt-5">
<h1>اطلب خدمة برمجية الآن 🚀</h1>
<p>مواقع - تطبيقات - متاجر</p>
</section>

<!-- ORDER FORM -->
<section class="container text-center mt-5">
<h2>إرسال طلب</h2>

<form id="orderForm">
<input id="name" class="form-control mb-2" placeholder="اسمك" required>
<input id="phone" class="form-control mb-2" placeholder="رقمك" required>
<textarea id="msg" class="form-control mb-2" placeholder="وش تحتاج" required></textarea>

<button class="btn-main">إرسال الطلب</button>
</form>

<p id="status"></p>
</section>

<!-- 🔥 Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔴 عوض هاد القيم بالقيم تاعك من Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

// init firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// submit form
document.getElementById("orderForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg").value;

    try{
        await db.collection("orders").add({
            name: name,
            phone: phone,
            msg: msg,
            created: new Date()
        });

        document.getElementById("status").innerText = "تم إرسال الطلب ✅";
    }catch(err){
        document.getElementById("status").innerText = "خطأ ❌";
        console.log(err);
    }
});
</script>

</body>
</html>
